# Deployment managed by hanzoai/universe — this workflow only builds and pushes images
name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  policy-check:
    name: Enforce Hanzo Cloud production policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce IAM + KMS + image policy
        run: |
          set -euo pipefail
          grep -q 'image: ghcr.io/hanzoai/cloud:latest' k8s/deployment.yaml
          grep -q 'name: cloud-runtime-secrets' k8s/deployment.yaml
          grep -q 'kind: KMSSecret' k8s/kms-secrets.yaml
          grep -q 'managedSecretReference:' k8s/kms-secrets.yaml
          grep -q 'HANZO_API_KEY' k8s/kms-secrets.yaml
          ! grep -q 'casdoorEndpoint' controllers/openai_api.go
          grep -q 'recordUsage' controllers/openai_api.go
          grep -q 'https://github.com/hanzoai/cloud/pkgs/container/cloud' README.md
          if grep -nE 'clientSecret = \"[^\"]+\"' k8s/configmap.yaml; then
            echo "k8s/configmap.yaml must not contain hardcoded clientSecret values"
            exit 1
          fi
          if grep -nE 'dataSourceName = \"user=' k8s/configmap.yaml; then
            echo "k8s/configmap.yaml must not contain hardcoded DB credentials"
            exit 1
          fi

  go-tests:
    name: Running Go tests
    runs-on: ubuntu-latest
    needs: [ policy-check ]
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: hanzo_cloud
          MYSQL_ROOT_PASSWORD: 123456
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ./go.mod
      - name: Tests
        run: go test -v $(go list ./...) -tags skipCi

  frontend:
    name: Front-end
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: ./web/yarn.lock
      - run: yarn install && CI=false yarn run build
        working-directory: ./web

  backend:
    name: Back-end
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ./go.mod
      - run: go version
      - name: Build
        run: |
          go build -race -ldflags "-extldflags '-static'"
        working-directory: ./

  linter:
    name: Go-Linter
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      # gen a dummy config file
      - run: touch dummy.yml

      - name: golangci-lint
        uses: hanzoai/golangci-lint-action@v6
        with:
          version: latest
          args: --disable-all -c dummy.yml -E=gofumpt --max-same-issues=0 --timeout 5m --modules-download-mode=mod


  tag-release:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: github.repository == 'hanzoai/cloud' && github.event_name == 'push'
    needs: [ frontend, backend, linter ]
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag with Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: github.repository == 'hanzoai/cloud' && github.event_name == 'push' && needs.tag-release.outputs.new-release-published == 'true'
    needs: [ tag-release ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Prepare Go caches
        run: |
          echo "GOMODCACHE=$RUNNER_TEMP/gomod" >> $GITHUB_ENV
          echo "GOCACHE=$RUNNER_TEMP/gocache" >> $GITHUB_ENV
          go clean -cache -modcache -testcache -fuzzcache

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Release
    if: github.repository == 'hanzoai/cloud' && github.event_name == 'push' && needs.tag-release.outputs.new-release-published == 'true'
    needs: [ tag-release ]
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/cloud
      target: standard
    secrets: inherit

  docker-allinone:
    name: Docker All-in-One Release
    if: github.repository == 'hanzoai/cloud' && github.event_name == 'push' && needs.tag-release.outputs.new-release-published == 'true'
    needs: [ tag-release ]
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/cloud-allinone
      target: allinone
    secrets: inherit

  dispatch-to-universe:
    needs: docker
    if: github.repository == 'hanzoai/cloud' && github.event_name == 'push' && needs.docker.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Compute image URI
        id: meta
        run: |
          IMAGE="ghcr.io/hanzoai/cloud"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_REF" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="${GITHUB_SHA}"
          fi
          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Dispatch image update to universe
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_DISPATCH_TOKEN }}
          repository: hanzoai/universe
          event-type: image-update
          client-payload: |
            {
              "service": "cloud-api",
              "image": "${{ steps.meta.outputs.image }}",
              "sha": "${{ github.sha }}",
              "repo": "${{ github.repository }}"
            }

      - name: Summary
        run: |
          echo "### Deploy dispatched to universe" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ steps.meta.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Flow:** image-receiver -> staging -> E2E -> production" >> "$GITHUB_STEP_SUMMARY"
