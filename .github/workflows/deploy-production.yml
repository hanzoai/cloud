name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "conf/**"
      - "k8s/**"
      - "Dockerfile"
      - ".github/workflows/deploy-production.yml"
  workflow_dispatch:

concurrency:
  group: cloud-production
  cancel-in-progress: false

jobs:
  policy-check:
    name: Enforce IAM-only auth and billing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce IAM-only auth and billing integration
        run: |
          set -euo pipefail
          grep -q 'iamEndpoint' controllers/openai_api.go
          ! grep -q 'casdoorEndpoint' controllers/openai_api.go
          grep -q 'recordUsage' controllers/openai_api.go

  docker:
    needs: [ policy-check ]
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/cloud
      platforms: 'linux/amd64'
      deploy: true
      deploy-deployment: cloud-api
      deploy-namespace: hanzo
      target: standard
    secrets: inherit

  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: [ docker ]
    steps:
      - name: Fetch deploy credentials from KMS
        id: kms
        env:
          KMS_CLIENT_ID: ${{ secrets.KMS_CLIENT_ID }}
          KMS_CLIENT_SECRET: ${{ secrets.KMS_CLIENT_SECRET }}
          HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
          KMS_ENDPOINT: ${{ vars.KMS_ENDPOINT || 'https://kms.hanzo.ai' }}
        run: |
          # Auth: Universal Auth (preferred) or legacy API key
          if [ -n "${KMS_CLIENT_ID}" ] && [ -n "${KMS_CLIENT_SECRET}" ]; then
            HANZO_API_KEY=$(curl -sf "${KMS_ENDPOINT}/api/v1/auth/universal-auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"clientId\":\"${KMS_CLIENT_ID}\",\"clientSecret\":\"${KMS_CLIENT_SECRET}\"}" | jq -r '.accessToken')
          fi
          response=$(curl -sf "${KMS_ENDPOINT}/api/v3/secrets/raw?workspaceId=e1359bf4-31b4-4dfa-bb90-323e2c298ad8&secretPath=/deploy&environment=prod" \
            -H "Authorization: Bearer ${HANZO_API_KEY}" 2>/dev/null || echo "")
          if [ -n "$response" ]; then
            token=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="DO_API_TOKEN") | .secretValue // empty')
          fi
          if [ -z "${token:-}" ]; then
            echo "::error::Deploy credentials not found. Set HANZO_API_KEY with KMS access."
            exit 1
          fi
          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ steps.kms.outputs.token }}

      - name: Configure kubectl
        run: |
          set -euo pipefail
          doctl kubernetes cluster kubeconfig save "${{ secrets.DO_CLUSTER_ID }}"

      - name: Verify IAM tenancy configuration
        run: |
          set -euo pipefail
          # KMS operator syncs secrets with CLOUD_RUNTIME_SECRETS__ prefix
          kubectl get secret cloud-runtime-secrets -n hanzo >/dev/null
          IAM_ENDPOINT="$(kubectl get secret cloud-runtime-secrets -n hanzo -o jsonpath='{.data.CLOUD_RUNTIME_SECRETS__IAMENDPOINT}' | base64 -d)"
          CLIENT_ID="$(kubectl get secret cloud-runtime-secrets -n hanzo -o jsonpath='{.data.CLOUD_RUNTIME_SECRETS__CLIENTID}' | base64 -d)"
          CLIENT_SECRET="$(kubectl get secret cloud-runtime-secrets -n hanzo -o jsonpath='{.data.CLOUD_RUNTIME_SECRETS__CLIENTSECRET}' | base64 -d)"
          DATA_SOURCE_NAME="$(kubectl get secret cloud-runtime-secrets -n hanzo -o jsonpath='{.data.CLOUD_RUNTIME_SECRETS__DATASOURCENAME}' | base64 -d)"
          HANZO_API_KEY_VALUE="$(kubectl get secret cloud-runtime-secrets -n hanzo -o jsonpath='{.data.CLOUD_RUNTIME_SECRETS__HANZO_API_KEY}' | base64 -d)"
          if [ "$IAM_ENDPOINT" != "http://iam.hanzo.svc.cluster.local:8000" ]; then
            echo "cloud-runtime-secrets.IAMENDPOINT must be http://iam.hanzo.svc.cluster.local:8000, got ${IAM_ENDPOINT}"
            exit 1
          fi
          [ -n "$CLIENT_ID" ] || (echo "cloud-runtime-secrets.CLIENTID is empty" && exit 1)
          [ -n "$CLIENT_SECRET" ] || (echo "cloud-runtime-secrets.CLIENTSECRET is empty" && exit 1)
          [ -n "$DATA_SOURCE_NAME" ] || (echo "cloud-runtime-secrets.DATASOURCENAME is empty" && exit 1)
          [ -n "$HANZO_API_KEY_VALUE" ] || (echo "cloud-runtime-secrets.HANZO_API_KEY is empty" && exit 1)

      - name: Verify public health endpoint
        run: |
          set -euo pipefail
          STATUS="$(curl -sS -o /dev/null -w "%{http_code}" https://cloud.hanzo.ai/api/health || true)"
          if [ "$STATUS" != "200" ]; then
            echo "health check failed: https://cloud.hanzo.ai/api/health returned $STATUS"
            exit 1
          fi
