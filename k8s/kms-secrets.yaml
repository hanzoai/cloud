# Hanzo Cloud runtime secrets via Hanzo KMS (native KMS operator).
#
# Prerequisites:
# 1) KMS operator (KMSSecret CRD) is installed in the target cluster.
# 2) Project "hanzo-k8s-epiq" with env "prod" exists in Hanzo KMS.
# 3) Path "/cloud-runtime-secrets" in that project contains these keys
#    (KMS operator syncs them with CLOUD_RUNTIME_SECRETS__ prefix):
#    - CLOUD_RUNTIME_SECRETS__DATASOURCENAME
#    - CLOUD_RUNTIME_SECRETS__IAMENDPOINT
#    - CLOUD_RUNTIME_SECRETS__CLIENTID
#    - CLOUD_RUNTIME_SECRETS__CLIENTSECRET
#    - CLOUD_RUNTIME_SECRETS__HANZO_API_KEY
#
# The operator syncs those keys into Secret: cloud-runtime-secrets.
---
apiVersion: v1
kind: Secret
metadata:
  name: kms-auth
  namespace: hanzo
  labels:
    app.kubernetes.io/name: cloud-api
    app.kubernetes.io/component: kms-auth
    app.kubernetes.io/part-of: hanzo-cloud
type: Opaque
stringData:
  clientId: ""      # KMS machine identity client ID
  clientSecret: ""  # KMS machine identity client secret
---
apiVersion: secrets.lux.network/v1alpha1
kind: KMSSecret
metadata:
  name: cloud-runtime-kms-sync
  namespace: hanzo
  labels:
    app.kubernetes.io/name: cloud-api
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: hanzo-cloud
spec:
  hostAPI: https://kms.hanzo.ai/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: hanzo
      secretsScope:
        projectSlug: hanzo-k8s-epiq
        envSlug: prod
        secretsPath: /cloud-runtime-secrets
  managedSecretReference:
    secretName: cloud-runtime-secrets
    secretNamespace: hanzo
    secretType: Opaque
